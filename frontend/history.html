<!DOCTYPE html>
<html>
<head>
    <title>Transaction History</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">💳 E-Wallet</div>
    <div class="nav-right">
        <span id="nav-user">Hi...</span>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="card">
    <h2>Transaction History</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Sender</th>
                <th>Receiver</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="history-body"></tbody>
    </table>
</div>

    <br>
    <button class="card-btn" onclick="goBack()">← Back to Dashboard</button>

</div>

<script src="js/history.js"></script>

</body>
</html>
